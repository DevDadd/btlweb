<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>

<body>
    <div class="bg bg-gradient-only" aria-hidden="true"></div>
    <header class="app-bar">
        <a href="index.html" class="logo">
            GYM<span class="logo-highlight">PT</span>
        </a>
        <nav class="menu">
            <a href="index.html">Home</a>
            <a href="exercise.html">Exercises</a>
            <a href="#">Workouts</a>
            <a href="#">Profile</a>
        </nav>

    </header>
    <div class="row">
        <div class="profile-stack">
            <div class="profile-container">
                <div class="profile-avatar">
                    <img src="assets/avatar.jpg" alt="Profile Avatar">
                </div>
            </div>
            <button class="camera-btn" type="button" aria-label="Change avatar">
                📷
            </button>
        </div>
        <div class="column">
            <div class="profile-info">
                <div class="profile-name">John Doe</div>
                <div class="profile-row">
                    <i class="fas fa-envelope"></i>
                    <div class="email-info">user@example.com</div>
                    <div class="sizedbox10"></div>
                    <i class="fas fa-phone"></i>
                    <div class="phone-info">+1234567890</div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
